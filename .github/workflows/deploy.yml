name: CI and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            mirofish/package-lock.json
            mirofish/frontend/package-lock.json

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: mirofish/backend/uv.lock

      - name: Test dashboard frontend
        run: |
          npm ci --prefix frontend
          npm test --prefix frontend
          npm run build --prefix frontend

      - name: Build MiroFish frontend
        run: |
          npm ci --prefix mirofish
          npm ci --prefix mirofish/frontend
          npm run build --prefix mirofish

      - name: Test backend
        env:
          LLM_API_KEY: ci-placeholder
          ZEP_API_KEY: ci-placeholder
        run: |
          uv sync --project mirofish/backend --frozen
          uv run --project mirofish/backend pytest -q

  deploy:
    name: Deploy production
    needs: test
    if: github.ref == 'refs/heads/main' && github.repository == 'GenyoNguyen/one-week-stand'
    runs-on:
      - self-hosted
      - linux
      - x64
      - micro-production
    timeout-minutes: 30
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Deploy frontend and backend
        env:
          DEPLOY_ROOT: /home/tcuong1000/micro-production
          MIROFISH_ENV_FILE: /home/tcuong1000/micro/.env
        run: ./scripts/deploy.sh

  smoke-test:
    name: Verify public deployment
    needs: deploy
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check frontend and backend through Nginx
        run: |
          curl --fail --show-error --silent --retry 12 --retry-delay 5 --retry-all-errors \
            --max-time 10 http://20.195.42.122/ >/dev/null
          curl --fail --show-error --silent --retry 12 --retry-delay 5 --retry-all-errors \
            --max-time 10 http://20.195.42.122/health >/dev/null
