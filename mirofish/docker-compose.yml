services:
  mirofish:
    build: .
    image: mirofish:local
    container_name: mirofish
    env_file:
      - .env
    environment:
      FLASK_HOST: "0.0.0.0"
      MIROFISH_UI_HOST: "0.0.0.0"
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads
